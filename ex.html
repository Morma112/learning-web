<!DOCTYPE html>
<html>

<head>
    <title>คลังรวม Tag HTML</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>หน้าทดสอบ Tag HTML</h1>
    <p>นี่คือย่อหน้าที่ 1 และนี่คือ <strong>ตัวหนา</strong></p>

    <hr>

    <h3>สิ่งที่ต้องซื้อ:</h3>
    <ul>
        <li>นมสด</li>
        <li>ไข่ไก่</li>
    </ul>

    <h3>กรอกข้อมูลติดต่อ:</h3>
    <input type="text" placeholder="พิมพ์ชื่อของคุณ">
    <button>ส่งข้อมูล</button>

</body>

</html>
